<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de notícias</title>

    <link rel="stylesheet" href="styles/index.css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<body>
    <header class="container">
        <nav id="primary"  class=" grid grid-flow-col">
            <div> 
                <img src="assets/icons/List.svg" alt="">
                <strong> Menu </strong>
            </div>

            <div>
                <img src="assets/icons/Logo.svg" alt="">
            </div>

            <div>
                <strong> Buscar </strong>
                <img src="assets/icons/MagnifyingGlass.svg" alt="">
            </div>
        </nav>

        <nav id="secondary" class=" grid grid-flow-col">
            <a ref="#"> Inteligência Artificial </a>
            <a ref="#"> Blockchain </a>
            <a ref="#"> Hologramas </a>
            <a ref="#"> Internet </a>
            <a ref="#"> Vestíveis </a>
            <a ref="#"> Realidade aumentada </a>
            <a ref="#"> Realidade virtual </a>
        </nav>
    </header>

    <main class="grid container">
        <section id="featured" class="grid grid-flow-col gap-16">
            <figure class="card">
                <img src="assets/images/Image 01.png">

                <figcaption> 
                    <span class="content-tag"> robótica</span>
                    <h2 class="text-2x1">Robôs domésticos começam a ser adotados para tarefas diárias, prometendo mais conforto e eficiência nas residências.</h2>
                </figcaption>
            </figure>

            <div class="grid grid-cols-2 gap-16">
                <figure class="card">
                    <img src="assets/images/Image 02.png">
                    <figcaption> 
                    <span class="content-tag"> hologramas </span>
                    <h2 class="text-lg"> Novo Smartphone Projetor 3D chega ao mercado, transformando a forma como vemos nossas telas! </h2>
                    </figcaption>
                </figure>

                 <figure class="card">
                    <img src="assets/images/Image 03.png">
                    <figcaption> 
                    <span class="content-tag"> internet </span>
                    <h2 class="text-lg"> Tecnologia 6G chega às metrópoles brasileiras, prometendo revolucionar a forma como vivemos e nos comunicamos.</h2>
                    </figcaption>
                 </figure>

                 <figure class="card">
                    <img src="assets/images/Image 04.png">
                    <figcaption> 
                    <span class="content-tag"> vestíveis </span>
                    <h2 class="text-lg"> Empresa lança relógio inteligente capaz de monitorar a saúde mental. oferecendo insigths valiosos para o bem-estar pessoal.</h2>
                    </figcaption>
                 </figure>

                 <figure class="card">
                    <img src="assets/images/Image 05.png">
                    <figcaption> 
                    <span class="content-tag"> realidade virtual </span>
                    <h2 class="text-lg"> Escolas adotam tecnologia VR para proporcionar experiências imersivas, transformando a aprendizagem tradicional.</h2>
                    </figcaption>
                 </figure>
             </div>
        </section>

    </main>


</body>
</html>
